name: Release (npm + crates.io)

# Publish the npm package and the crates.io crate. There is no Zig package step:
# Zig has no central registry — consumers `zig fetch` this repo at a git tag, so
# pushing the tag *is* the Zig release. The Homebrew CLI release is a separate
# workflow (homebrew.yml).
#
# DISABLED FOR NOW: runs only via manual `workflow_dispatch`. Re-enable automatic
# tag releases by uncommenting the `push.tags` trigger below. Before enabling,
# note the crate cannot publish until `bindings/rust/fig/Cargo.toml` gains a
# `license`/`license-file` and `description` (crates.io rejects without them).
#
# Required repository secrets (when enabled):
#   NPM_TOKEN             — npm automation token with publish rights
#   CARGO_REGISTRY_TOKEN  — crates.io API token with publish rights
on:
  workflow_dispatch: {}
  # push:
  #   tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  crate:
    name: Publish crate (crates.io)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # build.rs compiles the core, and `vendor-rust` bundles the Zig source into
      # the published crate.
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches the canonical version
        if: github.ref_type == 'tag'
        run: |
          canonical=$(grep -E '^\s*\.version\s*=' build.zig.zon | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          tag="${GITHUB_REF_NAME#v}"
          if [ "$canonical" != "$tag" ]; then
            echo "::error::tag $GITHUB_REF_NAME ($tag) != build.zig.zon version ($canonical)"
            exit 1
          fi
          echo "version $canonical matches tag $GITHUB_REF_NAME"

      - run: cargo test --workspace --locked
        working-directory: bindings/rust

      # Vendors the Zig source into the fig crate AND fans the root LICENSE files
      # out into both crate dirs — must run before either publish so the license
      # text is present in each packaged tarball.
      - name: Vendor the Zig source and licenses into the crates
        run: zig build vendor-rust

      # fig-macros must be on crates.io before fig
      - name: Publish fig-macros
        run: cargo publish -p fig-macros
        working-directory: bindings/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish fig
        run: cargo publish -p fig
        working-directory: bindings/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  npm:
    name: Publish package (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: bindings/typescript/package-lock.json

      - name: Verify tag matches the package version
        if: github.ref_type == 'tag'
        run: |
          pkg=$(node -p "require('./bindings/typescript/package.json').version")
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::tag $GITHUB_REF_NAME ($tag) != package.json version ($pkg)"
            exit 1
          fi
          echo "version $pkg matches tag $GITHUB_REF_NAME"

      - run: npm ci
        working-directory: bindings/typescript
      - run: npm run build
        working-directory: bindings/typescript
      - run: npm test
        working-directory: bindings/typescript
      - name: Publish to npm
        run: npm publish --access public
        working-directory: bindings/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
