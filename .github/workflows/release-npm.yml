name: Release (npm)
# Publish @adammharris/fig (bindings/typescript), a JS *library* (parse/edit/
# serialize as an API) backed by a freestanding wasm reactor module. Split out
# from release.figl (crates.io: fig + fig-macros) and release-npm-wasi.figl
# (the npx-able fig-wasi CLI package) so each publish, on its own tag line
# and with its own required secret, can run (and be re-triggered)
# independently of the others.
#
# This job LIVEs on its own tag line (also runnable by hand via
# `workflow_dispatch`, which runs it unconditionally): `npm/v*.*.*`. See
# "Release tagging" in docs/VERSIONING.md for the full per-artifact tag
# scheme (there's also a `core/v*.*.*` line that nothing here listens for —
# it exists for `zig fetch` + the ABI semver baseline, not npm/crates.io).
#
# `npm/*` is an independent track with no required relation to its tag's
# version beyond the cross-artifact floor (`zig build version-floor`, checked
# below): it publishes whatever package.json says and no-ops if that exact
# version is already out.
#
# Required repository secret:
# NPM_TOKEN  — npm automation token with publish rights (not yet set — this
# job will fail at the publish step until it's added: `gh secret
# set NPM_TOKEN`); needs publish rights to @adammharris/fig.
on:
  workflow_dispatch: {}
  push: { tags: [npm/v*.*.*] }
permissions: { id-token: write, contents: read }
jobs:
  npm:
    name: Publish package (npm) — fig (library)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: mlugg/setup-zig@v2
      with: { version: 0.16.0 }
    - uses: actions/setup-node@v7
      with:
        # Node 24+: the test suite uses `using` (explicit resource management),
        # which only parses under `--experimental-transform-types` type
        # stripping on Node 24 and later.
        node-version: 24
        registry-url: https://registry.npmjs.org
        cache: npm
        cache-dependency-path: bindings/typescript/package-lock.json
    # The npm package is an independent track (see the header comment above) —
    # this only checks it (and everything else) stays >= the core it embeds,
    # not that it equals the tag.
    - name: Verify the cross-artifact version floor
      run: zig build version-floor
    - run: npm ci
      working-directory: bindings/typescript
    - run: npm run build
      working-directory: bindings/typescript
    - run: npm test
      working-directory: bindings/typescript
    # Idempotent like the crate publishes (see release.figl's `crate` job): npm
    # reports a duplicate version as E403 "cannot publish over the previously
    # published versions" — only that exact conflict is swallowed, so a bad
    # token (E401) or a forbidden scope (a different E403, e.g.
    # "Forbidden"/"do not have permission") still fails.
    - name: Publish to npm
      working-directory: bindings/typescript
      env: { NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}' }
      run: |
        if out=$(npm publish --access public 2>&1); then
          echo "$out"
        else
          echo "$out"
          if echo "$out" | grep -qiE 'cannot publish over|previously published|EPUBLISHCONFLICT'; then
            echo "::notice::npm version already published — skipping"
          else
            exit 1
          fi
        fi
