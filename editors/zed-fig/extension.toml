id = "fig"
name = "Fig"
version = "0.0.1"
schema_version = 1
authors = ["Adam Harris <amh421@icloud.com>"]
description = "Syntax highlighting for the fig authoring dialect"
repository = "https://github.com/adammharris/fig"

# The grammar lives in a subdirectory of this same repo (a monorepo layout).
# Zed clones `repository` at `rev`, then looks in `path` for the grammar.
#
# IMPORTANT: `rev` must be a COMMIT that actually contains
# editors/tree-sitter-fig (grammar.js + generated src/parser.c). After you
# commit the grammar, update this sha to that commit, then re-run
# `zed: install dev extension`. During local iteration you re-commit the grammar
# and bump this rev (Zed has no "live" local-grammar mode — it builds from git).
[grammars.fig]
repository = "file:///Users/adamharris/Documents/fig"
path = "editors/tree-sitter-fig"
rev = "9047c8ec324a975f4b146aa0ddd808815eaf5d68"

# The language server. `name` is cosmetic; `languages` must match the `name` in
# languages/fig/config.toml. Zed launches the binary returned by
# language_server_command in src/lib.rs.
[language_servers.fig-lsp]
name = "Fig LSP"
languages = ["Fig"]
